<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>My Wishlist - EssenceMarket</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec13",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102210",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            font-family: 'Manrope', sans-serif;
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
    <div
        class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden pb-24">
        <!-- Header -->
        <header
            class="sticky top-0 z-50 flex items-center bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md p-4 justify-between border-b border-primary/10">
            <a href="index.html"
                class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
                <span class="material-symbols-outlined">arrow_back_ios_new</span>
            </a>
            <h1
                class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center">
                My Wishlist</h1>
            <div class="w-10"></div> <!-- space perfectly coordinates the absolute center element -->
        </header>

        <!-- Main Content (Wishlist Grid) -->
        <main class="flex-1 px-4 py-6" id="wishlist-container">
            <!-- Items injected by JS -->
            <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 opacity-60">
                <span class="material-symbols-outlined text-6xl mb-4"
                    style="font-variation-settings: 'FILL' 0;">favorite</span>
                <p class="text-lg font-bold text-center">Your wishlist is empty</p>
                <p class="text-sm text-slate-500 mt-2 text-center max-w-[250px]">Explore our store and save your
                    favorite items here!</p>
                <a href="index.html"
                    class="mt-6 text-primary font-bold bg-primary/10 px-6 py-3 rounded-xl hover:bg-primary/20 transition-colors">Start
                    Shopping</a>
            </div>

            <div id="wishlist-grid" class="grid grid-cols-2 gap-4">
                <!-- Template to be injected -->
            </div>
        </main>

        <!-- Bottom Navigation Bar -->
        <div
            class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-t border-primary/10 px-4 pb-6 pt-2 z-50">
            <div class="flex gap-2 justify-around max-w-md mx-auto">
                <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors"
                    href="index.html">
                    <div class="flex h-8 items-center justify-center">
                        <span class="material-symbols-outlined">local_mall</span>
                    </div>
                    <p class="text-[10px] font-medium leading-normal tracking-[0.015em]">Shop</p>
                </a>
                <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors"
                    href="index.html">
                    <div class="flex h-8 items-center justify-center">
                        <span class="material-symbols-outlined">explore</span>
                    </div>
                    <p class="text-[10px] font-medium leading-normal tracking-[0.015em]">Explore</p>
                </a>
                <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors"
                    href="cart.html">
                    <div class="flex h-8 items-center justify-center relative">
                        <span class="material-symbols-outlined">shopping_cart</span>
                        <span id="cart-badge"
                            class="absolute -top-1 -right-2 bg-primary text-background-dark text-[10px] font-bold h-4 w-4 rounded-full flex items-center justify-center hidden">0</span>
                    </div>
                    <p class="text-[10px] font-medium leading-normal tracking-[0.015em]">Cart</p>
                </a>
                <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors"
                    href="#" data-profile-btn>
                    <div class="flex h-8 items-center justify-center">
                        <span class="material-symbols-outlined">person</span>
                    </div>
                    <p class="text-[10px] font-medium leading-normal tracking-[0.015em]">Profile</p>
                </a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const wishlistContainer = document.getElementById('wishlist-container');
            const wishlistGrid = document.getElementById('wishlist-grid');
            const emptyState = document.getElementById('empty-state');

            const renderWishlist = () => {
                const wishlist = getWishlist();
                wishlistGrid.innerHTML = '';

                if (wishlist.length === 0) {
                    emptyState.classList.remove('hidden');
                    wishlistGrid.classList.add('hidden');
                } else {
                    emptyState.classList.add('hidden');
                    wishlistGrid.classList.remove('hidden');

                    wishlist.forEach((item, index) => {
                        const card = document.createElement('div');
                        card.className = 'bg-white dark:bg-slate-800 rounded-2xl overflow-hidden flex flex-col shadow-sm border border-slate-100 dark:border-slate-700 fade-in';
                        card.style.animation = `fadeIn 0.3s ease-in-out ${index * 0.05}s both`;

                        card.innerHTML = `
                            <div class="relative w-full aspect-square bg-slate-50 dark:bg-slate-900 group">
                                <img class="w-full h-full object-cover" src="${item.image}" alt="${item.title}" />
                                <button data-index="${index}" class="remove-btn absolute top-2 right-2 p-2 bg-white/90 backdrop-blur rounded-full text-red-500 shadow-sm hover:bg-red-50 transition-colors active:scale-90">
                                    <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;">delete</span>
                                </button>
                            </div>
                            <div class="p-3 flex flex-col flex-1">
                                <span class="text-[10px] uppercase tracking-wider font-bold text-primary mb-1">${item.category}</span>
                                <h3 class="text-slate-900 dark:text-slate-100 font-bold text-sm leading-snug line-clamp-1">${item.title}</h3>
                                <div class="flex items-center gap-1 mt-1">
                                    <span class="text-xs font-bold text-slate-900 dark:text-slate-100">${item.price}</span>
                                </div>
                                <button class="add-to-cart-btn mt-3 w-full bg-primary py-2 rounded-lg text-white text-xs font-bold flex items-center justify-center gap-2 transition-colors active:scale-95">
                                    <span class="material-symbols-outlined text-sm">shopping_cart</span> Add
                                </button>
                            </div>
                        `;
                        wishlistGrid.appendChild(card);
                    });

                    // Attach event listeners
                    document.querySelectorAll('.remove-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const idx = e.currentTarget.getAttribute('data-index');
                            let currentWishlist = getWishlist();
                            currentWishlist.splice(idx, 1);
                            saveWishlist(currentWishlist);

                            // Animate out
                            const card = e.currentTarget.closest('.bg-white');
                            card.style.transition = 'all 0.3s ease-out';
                            card.style.transform = 'scale(0.9)';
                            card.style.opacity = '0';

                            setTimeout(() => {
                                renderWishlist(); // re-render after animation
                            }, 300);
                        });
                    });

                    document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const match = e.currentTarget.closest('.bg-white');
                            const title = match.querySelector('h3').textContent.trim();
                            const priceText = match.querySelector('.text-xs.font-bold').textContent.trim();
                            const priceMatch = priceText.replace(/[^0-9.]/g, ''); // Allow decimal for price
                            const price = priceMatch ? parseFloat(priceMatch) : 0; // Parse as float
                            const image = match.querySelector('img').src;
                            const category = match.querySelector('.uppercase').textContent.trim();

                            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
                            let existingItem = cart.find(item => item.title === title);
                            if (existingItem) {
                                existingItem.quantity += 1;
                            } else {
                                cart.push({ title, price, image, category, quantity: 1, originalPriceText: priceText });
                            }
                            localStorage.setItem('cart', JSON.stringify(cart));
                            updateCartBadge();

                            btn.innerHTML = '<span class="material-symbols-outlined text-sm">check</span> Added';
                            btn.classList.replace('bg-primary', 'bg-emerald-600');
                            setTimeout(() => {
                                btn.innerHTML = '<span class="material-symbols-outlined text-sm">shopping_cart</span> Add';
                                btn.classList.replace('bg-emerald-600', 'bg-primary');
                            }, 1500);
                        });
                    });
                }
            };

            renderWishlist();
        });
    </script>
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</body>

</html>
